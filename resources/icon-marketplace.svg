<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E07A5F"/>
      <stop offset="100%" stop-color="#C4563A"/>
    </linearGradient>
    <linearGradient id="terminal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(0,0,0,0.25)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.35)"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="256" height="256" rx="48" fill="url(#bg)"/>

  <!-- Terminal window -->
  <rect x="32" y="52" width="192" height="152" rx="16" fill="url(#terminal)"/>

  <!-- Title bar dots -->
  <circle cx="56" cy="72" r="5" fill="rgba(255,255,255,0.5)"/>
  <circle cx="74" cy="72" r="5" fill="rgba(255,255,255,0.5)"/>
  <circle cx="92" cy="72" r="5" fill="rgba(255,255,255,0.5)"/>

  <!-- Terminal prompt chevron -->
  <path d="M56 112 L84 132 L56 152" stroke="white" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Cursor/text line -->
  <line x1="100" y1="152" x2="148" y2="152" stroke="white" stroke-width="10" stroke-linecap="round" opacity="0.7"/>

  <!-- Sparkle (AI indicator) - top right area -->
  <path d="M188 100 L188 88" stroke="white" stroke-width="6" stroke-linecap="round"/>
  <path d="M182 94 L194 94" stroke="white" stroke-width="6" stroke-linecap="round"/>

  <!-- Small sparkle -->
  <path d="M168 112 L168 106" stroke="white" stroke-width="4" stroke-linecap="round"/>
  <path d="M165 109 L171 109" stroke="white" stroke-width="4" stroke-linecap="round"/>
</svg>
